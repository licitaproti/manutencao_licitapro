<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Licitapro - em manutenção</title>

        <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
        <link rel="icon" href="images/favicon.png" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --primary-light: #224069;
                --primary-dark: #00aaff;
                --accent-light: #ffc107;
                --text-light: #f8f9fa;
                --text-dark: #1a1a1a;
                --bg-light: #ffffff;
                --bg-dark: #0f0f0f;
                --card-light: rgba(255, 255, 255, 0.15);
                --card-dark: rgba(255, 255, 255, 0.08);
                --shadow-light: rgba(0, 0, 0, 0.1);
                --shadow-dark: rgba(0, 0, 0, 0.3);
            }

            /* Modo claro */
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background: linear-gradient(135deg, #224069, #00aaff);
                color: var(--text-light);
                font-family: 'Poppins', sans-serif;
                text-align: center;
                transition: background 0.3s ease, color 0.3s ease;
                position: relative;
                overflow: hidden;
            }

            /* Efeito de fundo animado */
            body::before {
                content: '';
                position: absolute;
                top: -50%;
                right: -50%;
                width: 200%;
                height: 200%;
                background: radial-gradient(circle, rgba(0, 170, 255, 0.1) 1px, transparent 1px);
                background-size: 50px 50px;
                animation: moveBackground 20s linear infinite;
                z-index: 0;
                pointer-events: none;
            }

            @keyframes moveBackground {
                0% {
                    transform: translate(0, 0);
                }
                100% {
                    transform: translate(50px, 50px);
                }
            }

            /* Modo escuro */
            @media (prefers-color-scheme: dark) {
                body {
                    background: linear-gradient(135deg, #0a0e27, #1a3a52);
                    color: var(--text-light);
                }

                body::before {
                    background: radial-gradient(circle, rgba(0, 170, 255, 0.05) 1px, transparent 1px);
                }
            }

            .container-maintenance {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 2rem;
            }

            .maintenance-box {
                background: var(--card-light);
                border-radius: 2rem;
                padding: 3rem 2.5rem;
                max-width: 550px;
                width: 100%;
                box-shadow: 0 8px 32px var(--shadow-dark);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                animation: slideUp 0.8s ease-out;
                transition: all 0.3s ease;
            }

            @media (prefers-color-scheme: dark) {
                .maintenance-box {
                    background: var(--card-dark);
                    border: 1px solid rgba(255, 255, 255, 0.1);
                    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                }
            }

            .maintenance-box:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 40px var(--shadow-dark);
            }

            .logo-container {
                margin-bottom: 2rem;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .logo-container img {
                max-height: 80px;
                width: auto;
                animation: fadeIn 1s ease-out;
            }

            .icon-wrapper {
                font-size: 4rem;
                margin-bottom: 1.5rem;
                color: var(--accent-light);
                animation: pulse 2s ease-in-out infinite;
                display: inline-block;
            }

            @keyframes pulse {
                0%, 100% {
                    transform: scale(1);
                    opacity: 1;
                }
                50% {
                    transform: scale(1.1);
                    opacity: 0.8;
                }
            }

            h1 {
                font-weight: 700;
                font-size: 2.5rem;
                margin-bottom: 1rem;
                line-height: 1.2;
                animation: fadeIn 0.8s ease-out 0.2s both;
            }

            .subtitle {
                font-size: 1.1rem;
                margin-bottom: 2rem;
                line-height: 1.6;
                opacity: 0.95;
                animation: fadeIn 0.8s ease-out 0.4s both;
            }

            .status-info {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 1rem;
                margin-bottom: 2rem;
                padding: 1rem;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 1rem;
                animation: fadeIn 0.8s ease-out 0.6s both;
            }

            @media (prefers-color-scheme: dark) {
                .status-info {
                    background: rgba(255, 255, 255, 0.05);
                }
            }

            .spinner {
                width: 2rem;
                height: 2rem;
                border: 3px solid rgba(255, 255, 255, 0.3);
                border-top-color: var(--accent-light);
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .status-text {
                font-size: 0.95rem;
                font-weight: 500;
            }

            footer {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                padding: 1.5rem;
                text-align: center;
                font-size: 0.9rem;
                color: rgba(255, 255, 255, 0.7);
                background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.1));
                z-index: 10;
            }

            @media (prefers-color-scheme: dark) {
                footer {
                    background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.3));
                }
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @media (max-width: 768px) {
                .maintenance-box {
                    padding: 2rem 1.5rem;
                    border-radius: 1.5rem;
                }

                h1 {
                    font-size: 2rem;
                }

                .subtitle {
                    font-size: 1rem;
                }

                .icon-wrapper {
                    font-size: 3rem;
                }

                footer {
                    font-size: 0.85rem;
                    padding: 1rem;
                }
            }

            @media (max-width: 480px) {
                .container-maintenance {
                    padding: 1rem;
                }

                .maintenance-box {
                    padding: 1.5rem 1rem;
                    border-radius: 1.2rem;
                }

                h1 {
                    font-size: 1.6rem;
                }

                .subtitle {
                    font-size: 0.95rem;
                }

                .icon-wrapper {
                    font-size: 2.5rem;
                    margin-bottom: 1rem;
                }

                .feature-item {
                    min-width: 90px;
                    padding: 0.6rem;
                    font-size: 0.8rem;
                }

                .logo-container img {
                    max-height: 60px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container-maintenance">
            <div class="maintenance-box">
                <!-- Logo dinâmica -->
                <div class="logo-container">
                    <picture>
                        <source media="(prefers-color-scheme: dark)" srcset="images/logoDark.png">
                        <img src="images/logoLight.png" alt="Licitapro Logo" loading="lazy">
                    </picture>
                </div>

                <!-- Ícone principal -->
                <div class="icon-wrapper">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                </div>

                <!-- Título -->
                <h1>Em manutenção</h1>

                <!-- Subtítulo -->
                <p class="subtitle">
                    Estamos realizando atualizações para melhorar sua experiência.<br>
                </p>
                <p class="subtitle mt-2">Por favor, aguarde alguns instantes.</p>

                <div class="status-info">
                    <div class="spinner"></div>
                    <span class="status-text">Processando atualizações...</span>
                </div>
            </div>
        </div>

        <footer>
            &copy; <span id="ano"></span> - Licitapro | Todos os direitos reservados.
        </footer>

        <script>
            document.getElementById("ano").textContent = new Date().getFullYear();

            const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

            function handleDarkModeChange(e) {
                console.log('Modo escuro:', e.matches ? 'ativado' : 'desativado');
            }

            darkModeMediaQuery.addEventListener('change', handleDarkModeChange);
        </script>
    </body>
</html>
